name: release

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - id: pkg
        name: Read package version from pyproject
        run: echo "version=$(uv version --short)" >> "$GITHUB_OUTPUT"

      - name: Verify tag and release names match package version
        env:
          VERSION: ${{ steps.pkg.outputs.version }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
        run: |
          set -euo pipefail
          test "$TAG_NAME" = "$VERSION"
          test "$RELEASE_NAME" = "$VERSION"

      - name: Build distributions
        run: uv build --no-sources

      - name: Upload wheels to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/*.whl --clobber

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
